# arquivo: pubspec.yaml
name: dislexia_app
description: Aplicativo MVP para auxiliar pessoas com dislexia - TCC
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Gerenciamento de estado simples
  provider: ^6.1.1

  # Text-to-Speech para feedback sonoro
  flutter_tts: ^4.0.2

  # Ícones
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets do aplicativo
  assets:
    - assets/images/
    - assets/sounds/

  # Fontes personalizadas (opcional - facilita leitura para disléxicos)
  # fonts:
  #   - family: OpenDyslexic
  #     fonts:
  #       - asset: assets/fonts/OpenDyslexic-Regular.ttf
